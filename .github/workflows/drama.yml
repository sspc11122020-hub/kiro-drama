- name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # طباعة الملفات الموجودة للتأكد من مكانها (للتصحيح)
          echo "--- عرض محتويات المجلدات ---"
          find . -name "*.json"
          
          # إضافة الملفات الموجودة فقط بدون إيقاف السكربت
          git add Dailymotion/Videos/*.json || echo "لم يتم العثور على ملفات في Dailymotion/Videos"
          
          # في حال تم الحفظ في المجلد الرئيسي بدلاً من الفرعي
          git add *.json || echo "لم يتم العثور على ملفات json في المجلد الرئيسي"
          
          if git diff --staged --quiet; then
            echo "ℹ️ لا توجد تغييرات جديدة"
            exit 0
          fi
          
          git commit -m "تحديث الفيديوهات: $(date +'%Y-%m-%d %H:%M')"
          git pull origin main --rebase
          git push origin main
